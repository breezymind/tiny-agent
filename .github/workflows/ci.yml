name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate-package:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Compile extension entrypoints
        run: node scripts/build-extensions.mjs --builder esbuild

      - name: Verify package contents
        run: node scripts/package-smoke.mjs

      - name: Verify release worktree boundary
        run: node scripts/worktree-check.mjs --strict
